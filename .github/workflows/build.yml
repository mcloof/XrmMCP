name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore -warnaserror

    - name: Run unit tests
      run: dotnet test tests/XrmMcp.Tests.Unit/XrmMcp.Tests.Unit.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Run integration tests (optional)
      if: ${{ secrets.XRMMCP_ONLINE_CONNECTION_STRING != '' || secrets.XRMMCP_ONPREM_CONNECTION_STRING != '' }}
      env:
        XRMMCP_ONLINE_CONNECTION_STRING: ${{ secrets.XRMMCP_ONLINE_CONNECTION_STRING }}
        XRMMCP_ONPREM_CONNECTION_STRING: ${{ secrets.XRMMCP_ONPREM_CONNECTION_STRING }}
      run: dotnet test tests/XrmMcp.Tests.Integration/XrmMcp.Tests.Integration.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=integration-test-results.trx"

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Test Results
        path: '**/test-results.trx'
        reporter: dotnet-trx

    - name: Publish integration test results
      uses: dorny/test-reporter@v1
      if: (success() || failure()) && hashFiles('**/integration-test-results.trx') != ''
      with:
        name: Integration Test Results
        path: '**/integration-test-results.trx'
        reporter: dotnet-trx