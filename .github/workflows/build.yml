name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Run unit tests
      run: dotnet test tests/XrmMcp.Tests.Unit/XrmMcp.Tests.Unit.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Test Results
        path: '**/test-results.trx'
        reporter: dotnet-trx

    - name: Check for build warnings
      run: |
        $warnings = dotnet build --no-restore 2>&1 | Select-String "warning"
        if ($warnings) {
          Write-Host "⚠️ Build warnings detected:"
          Write-Host $warnings
          exit 1
        } else {
          Write-Host "✅ No build warnings"
        }
      shell: pwsh
